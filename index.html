<!DOCTYPE html>
<html lang="en" style="height: 100%;">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Aurumancer</title>
  <link rel="manifest" href="manifest.json">
  <style>
    @font-face {
      font-family: 'Dubai';
      src: url('Dubai-Regular.ttf') format('truetype');
      font-weight: 500;
      font-style: normal;
    }

    * {
      font-family: 'Dubai';
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      height: 100%;
      display: flex;
      flex-direction: column;
      background-color: black;
      padding: 0.5rem;
      gap: 0.5rem;
    }

    button {
      touch-action: manipulation;
      background: none;
      border: none;
      padding: 0;
    }

    svg {
      width: 100%;
      height: 100%;
    }

    #top-row {
      display: flex;
    }

    .top-row-cell {
      width: 33.33%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .set-max-hp-btn {
      color: rgb(254, 202, 202);
      border: 2px solid rgb(254, 202, 202);
      border-radius: 0.4rem;
      padding: 0.25rem 0.75rem;
      font-size: 0.95rem;
      background: black;
      touch-action: manipulation;
    }

    .reset-btn {
      color: rgb(229, 231, 235);
      border: 2px solid rgb(229, 231, 235);
      border-radius: 0.4rem;
      padding: 0.25rem 0.5rem;
      touch-action: manipulation;
      line-height: 0;
    }

    #stat-row {
      display: flex;
      flex: 1;
    }

    .outer-stat-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0.5rem;
      position: relative;
      width: 33.33%;
      height: 100%;
    }

    .inner-stat-box {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      border-width: 8px;
      border-style: solid;
      border-radius: 0.5rem;
    }

    .border-blue-200  { border-color: rgb(191, 219, 254); }
    .border-red-200   { border-color: rgb(254, 202, 202); }
    .border-yellow-200 { border-color: rgb(253, 230, 138); }

    .flex { display: flex; }
    .flex-grow { flex-grow: 1; }
    .w-full { width: 100%; }
    .justify-around { justify-content: space-around; }
    .justify-center { justify-content: center; }
    .items-center { align-items: center; }

    .icon-badge-blue {
      background-color: rgb(191, 219, 254);
      border-bottom-right-radius: 0.5rem;
      padding-right: 0.5rem;
    }

    .icon-badge-red {
      background-color: rgb(254, 202, 202);
      border-bottom-right-radius: 0.5rem;
      padding-right: 0.5rem;
    }

    .icon-badge-yellow {
      background-color: rgb(253, 230, 138);
      border-bottom-right-radius: 0.5rem;
      padding-right: 0.5rem;
    }

    .btn-size {
      width: clamp(2rem, 8vw, 4rem);
      height: clamp(2rem, 8vw, 4rem);
    }

    .btn-size-sm {
      width: clamp(1.5rem, 6vw, 3rem);
      height: clamp(1.5rem, 6vw, 3rem);
    }

    .stat-value {
      margin-top: 0.5rem;
      height: clamp(4rem, 15vw, 8rem);
      border-width: 4px;
      border-style: solid;
      border-radius: 0.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
      background-color: black;
      padding: 0 0.5rem;
      min-width: clamp(4rem, 15vw, 8rem);
    }

    .stat-value .current-val {
      font-size: clamp(2rem, 7vw, 4.5rem);
      line-height: 1;
    }

    .stat-value .max-val {
      font-size: 1.2rem;
      line-height: 1;
      opacity: 0.65;
    }

    .stat-value.blue   { color: rgb(191, 219, 254); border-color: rgb(191, 219, 254); }
    .stat-value.red    { color: rgb(254, 202, 202); border-color: rgb(254, 202, 202); }
    .stat-value.yellow { color: rgb(253, 230, 138); border-color: rgb(253, 230, 138); }

    .delta-indicator {
      color: rgb(229, 231, 235);
      font-size: 3.75rem;
      user-select: none;
      position: absolute;
      right: 0;
      top: 0;
      margin-top: 1.5rem;
      margin-right: 2rem;
    }

    #dialog-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    #dialog-overlay.open {
      display: flex;
    }

    #dialog-box {
      background: #111;
      border: 3px solid rgb(254, 202, 202);
      border-radius: 0.75rem;
      padding: 1.5rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      min-width: 16rem;
    }

    #dialog-box label {
      color: rgb(254, 202, 202);
      font-size: 1.1rem;
    }

    #dialog-input {
      font-family: 'Dubai', sans-serif;
      font-size: 2.5rem;
      width: 6rem;
      text-align: center;
      background: black;
      color: rgb(254, 202, 202);
      border: 3px solid rgb(254, 202, 202);
      border-radius: 0.5rem;
      padding: 0.25rem;
      -moz-appearance: textfield;
    }

    .dialog-btn-row {
      display: flex;
      gap: 1rem;
    }

    .dialog-confirm-btn, .dialog-cancel-btn {
      font-family: 'Dubai', sans-serif;
      font-size: 1rem;
      padding: 0.4rem 1.2rem;
      border-radius: 0.4rem;
      border: 2px solid rgb(254, 202, 202);
      touch-action: manipulation;
    }

    .dialog-confirm-btn {
      background: rgb(254, 202, 202);
      color: black;
    }

    .dialog-cancel-btn {
      background: black;
      color: rgb(254, 202, 202);
    }

    @media screen and (orientation: portrait) {
      #stat-row > .outer-stat-box,
      #top-row > .top-row-cell {
        display: none;
      }

      #rotate-overlay {
        display: flex;
      }
    }

    @media screen and (orientation: landscape) {
      #rotate-overlay {
        display: none;
      }
    }

    #rotate-overlay {
      position: fixed;
      inset: 0;
      background-color: black;
      color: white;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      z-index: 9999;
      font-size: 1.25rem;
      text-align: center;
      padding: 2rem;
    }

    #rotate-overlay svg {
      animation: rotate-hint 2s ease-in-out infinite;
    }

    @keyframes rotate-hint {
      0%, 100% { transform: rotate(0deg); }
      40%      { transform: rotate(90deg); }
      60%      { transform: rotate(90deg); }
    }
  </style>
</head>

<body>
  <div id="rotate-overlay">
    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="none" viewBox="0 0 24 24"
      stroke="rgb(191,219,254)" stroke-width="1.5">
      <rect x="4" y="2" width="10" height="16" rx="2" stroke="rgb(191,219,254)" stroke-width="1.5" fill="none"/>
      <path stroke-linecap="round" stroke-linejoin="round" d="M15 9l3 3-3 3" />
      <path stroke-linecap="round" stroke-linejoin="round" d="M18 12H9" />
    </svg>
    <p>Please rotate your device to landscape mode</p>
  </div>

  <!-- Max HP Dialog -->
  <div id="dialog-overlay">
    <div id="dialog-box">
      <label for="dialog-input">Set max HP</label>
      <div class="flex items-center">
        <button onmousedown="changeMaxHpInDialog(-1)" class="btn-size-sm">
          <svg xmlns="http://www.w3.org/2000/svg" fill="rgb(0,0,0)" viewBox="0 0 24 24" stroke-width="1.5" stroke="rgb(254,202,202)">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12H9m12 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
          </svg>
        </button>
        <input id="dialog-input" type="number" min="1" max="99" value="12" disabled />
        <button onmousedown="changeMaxHpInDialog(1)" class="btn-size-sm">
          <svg xmlns="http://www.w3.org/2000/svg" fill="rgb(0,0,0)" viewBox="0 0 24 24" stroke-width="1.5" stroke="rgb(254,202,202)">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v6m3-3H9m12 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
          </svg>
        </button>
      </div>
      <div class="dialog-btn-row">
        <button class="dialog-cancel-btn" onclick="closeMaxHpDialog(false)">Cancel</button>
        <button class="dialog-confirm-btn" onclick="closeMaxHpDialog(true)">Confirm</button>
      </div>
    </div>
  </div>

  <!-- Top row -->
  <div id="top-row">
    <div class="top-row-cell"><!-- Power: no max --></div>
    <div class="top-row-cell">
      <button class="set-max-hp-btn" onmousedown="openMaxHpDialog()">Set max HP</button>
    </div>
    <div class="top-row-cell">
      <button class="reset-btn" onmousedown="resetStats()">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="none" viewBox="0 0 24 24"
          stroke="rgb(229,231,235)" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
        </svg>
      </button>
    </div>
  </div>

  <!-- Stat row -->
  <div id="stat-row">

    <!-- Power -->
    <div class="outer-stat-box">
      <div class="inner-stat-box border-blue-200">
        <div class="flex w-full">
          <div class="icon-badge-blue">
            <img src="power-icon.png" width="48px">
          </div>
        </div>
        <div class="flex flex-grow w-full justify-around items-center">
          <button onmousedown="changeStat('power', -1)" class="btn-size">
            <svg xmlns="http://www.w3.org/2000/svg" fill="rgb(0,0,0)" viewBox="0 0 24 24" stroke-width="1.5"
              stroke="rgb(191,219,254)">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12H9m12 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
            </svg>
          </button>
          <div id="power" class="stat-value blue">
            <span class="current-val">0</span>
          </div>
          <button onmousedown="changeStat('power', 1)" class="btn-size">
            <svg xmlns="http://www.w3.org/2000/svg" fill="rgb(0,0,0)" viewBox="0 0 24 24" stroke-width="1.5"
              stroke="rgb(191,219,254)">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M12 9v6m3-3H9m12 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
            </svg>
          </button>
        </div>
      </div>
      <p id="power-delta" style="opacity: 0;" class="delta-indicator">0</p>
    </div>

    <!-- HP -->
    <div class="outer-stat-box">
      <div class="inner-stat-box border-red-200">
        <div class="flex w-full">
          <div class="icon-badge-red">
            <img src="player-hp-icon.png" width="48px">
          </div>
        </div>
        <div class="flex flex-grow w-full justify-around items-center">
          <button onmousedown="changeStat('hp', -1)" class="btn-size">
            <svg xmlns="http://www.w3.org/2000/svg" fill="rgb(0,0,0)" viewBox="0 0 24 24" stroke-width="1.5"
              stroke="rgb(254,202,202)">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12H9m12 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
            </svg>
          </button>
          <div id="hp" class="stat-value red">
            <span class="current-val" id="hp-current">12</span>
            <span class="max-val" id="hp-max-label">/ 20</span>
          </div>
          <button onmousedown="changeStat('hp', 1)" class="btn-size">
            <svg xmlns="http://www.w3.org/2000/svg" fill="rgb(0,0,0)" viewBox="0 0 24 24" stroke-width="1.5"
              stroke="rgb(254,202,202)">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M12 9v6m3-3H9m12 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
            </svg>
          </button>
        </div>
      </div>
      <p id="hp-delta" style="opacity: 0;" class="delta-indicator">0</p>
    </div>

    <!-- Gold -->
    <div class="outer-stat-box">
      <div class="inner-stat-box border-yellow-200">
        <div class="flex w-full">
          <div class="icon-badge-yellow">
            <img src="gold-icon.png" width="48px">
          </div>
        </div>
        <div class="flex flex-grow w-full justify-around items-center">
          <button onmousedown="changeStat('gold', -1)" class="btn-size">
            <svg xmlns="http://www.w3.org/2000/svg" fill="rgb(0,0,0)" viewBox="0 0 24 24" stroke-width="1.5"
              stroke="rgb(253,230,138)">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12H9m12 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
            </svg>
          </button>
          <div id="gold" class="stat-value yellow">
            <span class="current-val">0</span>
          </div>
          <button onmousedown="changeStat('gold', 1)" class="btn-size">
            <svg xmlns="http://www.w3.org/2000/svg" fill="rgb(0,0,0)" viewBox="0 0 24 24" stroke-width="1.5"
              stroke="rgb(253,230,138)">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M12 9v6m3-3H9m12 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
            </svg>
          </button>
        </div>
      </div>
      <p id="gold-delta" style="opacity: 0;" class="delta-indicator">0</p>
    </div>

  </div><!-- end #stat-row -->
</body>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }

  // Wake lock
  let wakeLock = null;

  async function requestWakeLock() {
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      document.addEventListener('visibilitychange', handleVisibilityChange);
    } catch (err) {
      console.error('Wake lock failed:', err);
    }
  }

  function handleVisibilityChange() {
    if (document.visibilityState === 'visible') requestWakeLock();
  }

  if ('wakeLock' in navigator) {
    try { requestWakeLock(); } catch { alert('Could not get wake lock'); }
  }

  // Stats
  const stats = {
    hp: 12,
    maxHp: 12,
    power: 0,
    gold: 12
  };

  const deltaStats = {
    hp:    { value: 0, transitionBeginTime: 0 },
    power: { value: 0, transitionBeginTime: 0 },
    gold:  { value: 0, transitionBeginTime: 0 },
  };

  const deltaTransitionMs = 2000;

  function getCurrentValueElement(id) {
    const box = document.getElementById(id);
    return box.querySelector('.current-val');
  }

  function changeStat(id, delta) {
    const currentStat = stats[id];

    if (currentStat === 0 && delta === -1) return;

    let nextStat = Math.max(currentStat + delta, 0);

    if (id === 'hp') {
      nextStat = Math.min(nextStat, stats.maxHp);
    }

    if (nextStat === currentStat) return;

    stats[id] = nextStat;
    getCurrentValueElement(id).textContent = nextStat;

    // Delta indicator
    const deltaStat = deltaStats[id];
    deltaStat.value += delta;

    const deltaElement = document.getElementById(`${id}-delta`);

    if (deltaStat.value === 0) {
      deltaStat.transitionBeginTime = 0;
      deltaElement.style.opacity = 0;
      return;
    }

    deltaElement.textContent = deltaStat.value > 0 ? `+${deltaStat.value}` : deltaStat.value.toString();

    const transitionBeginTime = new Date().getTime();
    deltaStat.transitionBeginTime = transitionBeginTime;

    const interval = setInterval(() => {
      if (deltaStat.transitionBeginTime !== transitionBeginTime) return;

      const elapsedMs = new Date().getTime() - transitionBeginTime;
      if (elapsedMs >= deltaTransitionMs) return;

      deltaElement.style.opacity = 1 - Math.pow(elapsedMs / deltaTransitionMs, 5);
    }, 10);

    setTimeout(() => {
      clearInterval(interval);
      if (deltaStat.transitionBeginTime === transitionBeginTime) {
        deltaStat.value = 0;
        deltaElement.style.opacity = 0;
      }
    }, deltaTransitionMs);
  }

  function changeMaxHpInDialog(delta) {
    const dialogInput = document.getElementById("dialog-input");
    let currentValue = parseInt(dialogInput.value);

    if (isNaN(currentValue)) {
      currentValue = stats.maxHp;
    }

    currentValue += delta;
    dialogInput.value = currentValue;
  }

  function openMaxHpDialog() {
    const input = document.getElementById('dialog-input');
    input.value = stats.maxHp;
    document.getElementById('dialog-overlay').classList.add('open');
    setTimeout(() => input.focus(), 50);
  }

  function closeMaxHpDialog(confirm) {
    if (confirm) {
      const newMaxHp = parseInt(document.getElementById('dialog-input').value);

      if (!isNaN(newMaxHp) && newMaxHp > 0) {
        const diff = newMaxHp - stats.maxHp;
        stats.maxHp = newMaxHp;
        changeStat('hp', diff);
        document.getElementById('hp-max-label').textContent = `/ ${newMaxHp}`;
      }
    }
    document.getElementById('dialog-overlay').classList.remove('open');
  }

  function resetStats() {
    stats.hp = stats.maxHp;
    getCurrentValueElement('hp').textContent = stats.maxHp;
    deltaStats.hp.value = 0;
    deltaStats.hp.transitionBeginTime = 0;
    document.getElementById('hp-delta').style.opacity = 0;

    stats.gold = 12;
    getCurrentValueElement('gold').textContent = 12;
    deltaStats.gold.value = 0;
    deltaStats.gold.transitionBeginTime = 0;
    document.getElementById('gold-delta').style.opacity = 0;
  }

  // Init UI
  getCurrentValueElement('hp').textContent = stats.hp;
  getCurrentValueElement('power').textContent = stats.power;
  getCurrentValueElement('gold').textContent = stats.gold;
  document.getElementById('hp-max-label').textContent = `/ ${stats.maxHp}`;
</script>

</html>
